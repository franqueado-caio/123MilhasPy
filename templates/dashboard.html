<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Atendimento 123 Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --primary: #f05929;
        --primary-d: #d94a1a;
        --text-dark: #2c3e50;
        --text-mid: #7f8c8d;
        --bg-page: #f0f2f5;
        --bg-card: #ffffff;
        --bg-chat: #f4f6f8;
        --border: #e0e0e0;
        --online: #27ae60;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.14);
        --radius: 16px;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-page);
        min-height: 100vh;
        color: var(--text-dark);
      }

      /* ── NAVBAR ── */
      .navbar-custom {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        padding: 10px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .navbar-custom .brand {
        font-weight: 700;
        font-size: 1.2rem;
        color: #fff;
      }
      .operador-badge {
        background: rgba(255, 255, 255, 0.18);
        padding: 6px 14px;
        border-radius: 50px;
        font-size: 0.82rem;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        display: inline-block;
        animation: pulse-dot 2s infinite;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── LAYOUT PRINCIPAL ── */
      .main-grid {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        padding: 20px;
        height: calc(100vh - 58px);
        max-width: 1400px;
        margin: 0 auto;
      }

      /* ── CARD GENÉRICO ── */
      .panel {
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-d) 100%);
        padding: 14px 18px;
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .panel-header .badge-pill {
        background: rgba(255, 255, 255, 0.25);
        font-size: 0.72rem;
        padding: 2px 9px;
        border-radius: 50px;
        font-weight: 700;
        margin-left: auto;
      }
      .panel-body {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── STATS BAR ── */
      .stats-bar {
        display: flex;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: #fafafa;
        flex-shrink: 0;
      }
      .stat-item {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid var(--border);
      }
      .stat-num {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--primary);
        line-height: 1;
      }
      .stat-lbl {
        font-size: 0.65rem;
        color: var(--text-mid);
        margin-top: 2px;
      }

      /* ── FILA ── */
      .fila-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .cliente-card {
        border-radius: 12px;
        background: #fff;
        border: 1.5px solid var(--border);
        padding: 12px 14px;
        cursor: pointer;
        transition: all 0.22s ease;
        position: relative;
        overflow: hidden;
      }
      .cliente-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--primary);
        border-radius: 4px 0 0 4px;
      }
      .cliente-card:hover:not(.is-atendendo) {
        transform: translateX(4px);
        box-shadow: 0 4px 16px rgba(240, 89, 41, 0.18);
        border-color: var(--primary);
      }
      .cliente-card.is-atendendo {
        background: #fff8f5;
        border-color: var(--primary);
        cursor: default;
      }
      .cliente-card.is-atendendo::before {
        background: var(--online);
      }

      .cliente-nome {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-dark);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
      }
      .cliente-meta {
        font-size: 0.72rem;
        color: var(--text-mid);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .badge-em-atendimento {
        background: var(--online);
        color: #fff;
        font-size: 0.65rem;
        padding: 2px 7px;
        border-radius: 50px;
        font-weight: 700;
        margin-left: auto;
      }

      /* ── EMPTY STATE ── */
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-mid);
      }
      .empty-state i {
        font-size: 2.8rem;
        margin-bottom: 12px;
        opacity: 0.35;
        display: block;
      }
      .empty-state p {
        font-size: 0.88rem;
      }

      /* ── PAINEL CHAT ── */
      .chat-panel {
        position: relative;
      }

      /* Estado vazio do chat */
      .chat-idle {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-mid);
        padding: 40px;
        text-align: center;
      }
      .chat-idle i {
        font-size: 4rem;
        opacity: 0.2;
        margin-bottom: 16px;
      }
      .chat-idle h4 {
        font-size: 1.1rem;
        margin-bottom: 6px;
        color: var(--text-dark);
      }
      .chat-idle p {
        font-size: 0.85rem;
      }

      /* Chat ativo */
      .chat-active {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Topbar do chat */
      .chat-topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
        background: #fff;
        flex-shrink: 0;
      }
      .chat-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--primary-d));
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .chat-info {
        flex: 1;
      }
      .chat-info .chat-nome {
        font-weight: 700;
        font-size: 0.95rem;
      }
      .chat-info .chat-status {
        font-size: 0.72rem;
        color: var(--online);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .chat-info .chat-status::before {
        content: '';
        width: 6px;
        height: 6px;
        background: var(--online);
        border-radius: 50%;
        display: inline-block;
      }
      .btn-finalizar {
        background: #e74c3c;
        color: #fff;
        border: none;
        border-radius: 50px;
        padding: 7px 16px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn-finalizar:hover {
        background: #c0392b;
      }

      /* Mensagens */
      .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        background: var(--bg-chat);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .messages-area::-webkit-scrollbar {
        width: 5px;
      }
      .messages-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .messages-area::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
      }

      .msg-bubble {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 16px;
        animation: msgIn 0.2s ease;
        font-size: 0.88rem;
        line-height: 1.45;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg-bubble .msg-meta {
        font-size: 0.67rem;
        margin-top: 5px;
        opacity: 0.65;
      }
      .msg-bubble .msg-sender {
        font-size: 0.72rem;
        font-weight: 700;
        margin-bottom: 3px;
        opacity: 0.8;
      }

      /* Cliente → esquerda */
      .msg-client {
        background: #fff;
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
        align-self: flex-start;
        box-shadow: var(--shadow-sm);
      }
      /* Operador → direita */
      .msg-operator {
        background: linear-gradient(135deg, var(--primary), var(--primary-d));
        color: #fff;
        border-bottom-right-radius: 4px;
        align-self: flex-end;
      }
      .msg-operator .msg-sender,
      .msg-operator .msg-meta {
        color: rgba(255, 255, 255, 0.75);
      }

      /* Sistema → centro */
      .msg-system {
        align-self: center;
        background: #e8eaec;
        color: var(--text-mid);
        font-size: 0.75rem;
        padding: 5px 14px;
        border-radius: 50px;
        max-width: 90%;
        text-align: center;
      }

      /* Input area */
      .input-area {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        background: #fff;
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        align-items: flex-end;
      }
      .msg-input {
        flex: 1;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 0.88rem;
        resize: none;
        max-height: 100px;
        min-height: 42px;
        font-family: inherit;
        transition: border-color 0.2s;
        outline: none;
      }
      .msg-input:focus {
        border-color: var(--primary);
      }
      .msg-input:disabled {
        background: #f5f5f5;
        cursor: not-allowed;
      }

      .btn-send {
        background: linear-gradient(135deg, var(--primary), var(--primary-d));
        color: #fff;
        border: none;
        border-radius: 12px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        flex-shrink: 0;
      }
      .btn-send:hover:not(:disabled) {
        transform: scale(1.06);
        box-shadow: 0 4px 12px rgba(240, 89, 41, 0.35);
      }
      .btn-send:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* ── MODAL GENÉRICO ── */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fadeOverlay 0.2s ease;
      }
      @keyframes fadeOverlay {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal-box {
        background: #fff;
        border-radius: 20px;
        padding: 32px 28px;
        max-width: 380px;
        width: 100%;
        text-align: center;
        box-shadow: var(--shadow-lg);
        animation: slideUp 0.25s ease;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .modal-icon {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 14px;
      }
      .modal-box h3 {
        font-size: 1.2rem;
        margin-bottom: 6px;
        color: var(--text-dark);
      }
      .modal-box p {
        font-size: 0.88rem;
        color: var(--text-mid);
        margin-bottom: 20px;
      }
      .modal-input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: inherit;
        margin-bottom: 16px;
        outline: none;
        transition: border-color 0.2s;
      }
      .modal-input:focus {
        border-color: var(--primary);
      }
      .modal-btn {
        width: 100%;
        background: linear-gradient(135deg, var(--primary), var(--primary-d));
        color: #fff;
        border: none;
        border-radius: 50px;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s;
      }
      .modal-btn:hover {
        transform: scale(1.02);
      }
      .modal-btn-ghost {
        background: #e0e0e0;
        color: var(--text-dark);
        margin-top: 8px;
      }
      .modal-btn-ghost:hover {
        background: #d0d0d0;
      }
      .modal-btn-danger {
        background: #e74c3c;
      }
      .modal-btn-danger:hover {
        background: #c0392b;
      }

      /* ── TOAST ── */
      #toast-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast-msg {
        background: linear-gradient(135deg, var(--primary), var(--primary-d));
        color: #fff;
        padding: 11px 18px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        box-shadow: var(--shadow-md);
        display: flex;
        align-items: center;
        gap: 8px;
        animation: toastIn 0.3s ease;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .toast-msg.removing {
        animation: toastOut 0.3s ease forwards;
      }
      @keyframes toastOut {
        to {
          opacity: 0;
          transform: translateX(30px);
        }
      }

      /* ── SCROLLBAR GLOBAL ── */
      .fila-list::-webkit-scrollbar {
        width: 5px;
      }
      .fila-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .fila-list::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 10px;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        .main-grid {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
          height: auto;
          min-height: calc(100vh - 58px);
        }
        .fila-panel {
          max-height: 260px;
        }
        .chat-panel {
          min-height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar-custom">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="brand"> <i class="fas fa-headset me-2"></i>123 Milhas — Atendimento </span>
        <div class="operador-badge">
          <span class="status-dot"></span>
          <span id="operadorNome">Carregando...</span>
        </div>
      </div>
    </nav>

    <!-- LAYOUT PRINCIPAL -->
    <div class="main-grid">
      <!-- PAINEL ESQUERDO: FILA -->
      <div class="panel fila-panel">
        <div class="panel-header">
          <i class="fas fa-clock"></i>
          Fila de Espera
          <span class="badge-pill" id="totalFila">0</span>
        </div>
        <div class="panel-body">
          <div class="stats-bar">
            <div class="stat-item">
              <div class="stat-num" id="statFila">0</div>
              <div class="stat-lbl">na fila</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" id="statAtivos">0</div>
              <div class="stat-lbl">em atend.</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" id="statTempMed">—</div>
              <div class="stat-lbl">espera méd.</div>
            </div>
          </div>
          <div class="fila-list" id="listaFila">
            <div class="empty-state">
              <i class="fas fa-user-friends"></i>
              <p>Nenhum cliente na fila</p>
            </div>
          </div>
        </div>
      </div>

      <!-- PAINEL DIREITO: CHAT -->
      <div class="panel chat-panel">
        <div class="panel-header">
          <i class="fas fa-comments"></i>
          <span id="chatTitulo">Chat</span>
        </div>

        <div class="panel-body">
          <!-- IDLE: nenhum chat selecionado -->
          <div class="chat-idle" id="chatIdle">
            <i class="fas fa-comment-dots"></i>
            <h4>Nenhum atendimento ativo</h4>
            <p>Selecione um cliente na fila ao lado para iniciar o atendimento</p>
          </div>

          <!-- ATIVO: chat em andamento -->
          <div class="chat-active" id="chatAtivo" style="display: none; flex: 1; overflow: hidden; flex-direction: column">
            <!-- Topbar com info do cliente -->
            <div class="chat-topbar">
              <div class="chat-avatar" id="chatAvatar">?</div>
              <div class="chat-info">
                <div class="chat-nome" id="chatNome">—</div>
                <div class="chat-status">Online</div>
              </div>
              <button class="btn-finalizar" onclick="fecharAtendimento()"><i class="fas fa-times"></i> Finalizar</button>
            </div>

            <!-- Mensagens -->
            <div class="messages-area" id="messagesArea"></div>

            <!-- Input -->
            <div class="input-area">
              <textarea id="msgInput" class="msg-input" placeholder="Digite uma mensagem…" rows="1" disabled></textarea>
              <button class="btn-send" id="btnSend" onclick="enviarMensagem()" disabled title="Enviar">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
      // ── ESTADO ──────────────────────────────────────────────────────────────
      let operadorNome = null
      let clienteAtual = null // { id, nome }
      let salaId = null
      let ultimoTimestamp = 0 // marca temporal da última msg recebida
      let pollInterval = null
      let ultimoTotalFila = 0
      let _modalClosable = true
      // Guarda o 'time' das msgs exibidas pelo operador para evitar duplicata no polling
      const msgsSentByMe = new Set()

      // ── INIT ──────────────────────────────────────────────────────────────────
      ;(function init() {
        const saved = localStorage.getItem('operadorNome')
        if (saved) {
          setOperador(saved)
          iniciarDashboard()
        } else {
          mostrarModalNome()
        }
      })()

      function setOperador(nome) {
        operadorNome = nome
        document.getElementById('operadorNome').textContent = nome
      }

      function iniciarDashboard() {
        buscarFila()
        setInterval(buscarFila, 3000)
        buscarStats()
        setInterval(buscarStats, 10000)
      }

      // ── MODAL: NOME DO OPERADOR ───────────────────────────────────────────────
      function mostrarModalNome() {
        abrirModal(
          `
          <div class="modal-icon"><i class="fas fa-headset"></i></div>
          <h3>Bem-vindo!</h3>
          <p>Digite seu nome para iniciar o atendimento</p>
          <input class="modal-input" id="m-nome" placeholder="Seu nome" autocomplete="off">
          <button class="modal-btn" onclick="confirmarNome()">Começar atendimento</button>
        `,
          false
        )
        setTimeout(() => {
          const inp = document.getElementById('m-nome')
          if (inp) {
            inp.focus()
            inp.addEventListener('keypress', (e) => {
              if (e.key === 'Enter') confirmarNome()
            })
          }
        }, 50)
      }

      function confirmarNome() {
        const nome = (document.getElementById('m-nome')?.value || '').trim()
        if (!nome) {
          toast('Por favor, digite seu nome', 'warning')
          return
        }
        localStorage.setItem('operadorNome', nome)
        setOperador(nome)
        fecharModal()
        iniciarDashboard()
      }

      // ── MODAL GENÉRICO ────────────────────────────────────────────────────────
      function abrirModal(html, closable = true) {
        fecharModal()
        _modalClosable = closable
        const overlay = document.createElement('div')
        overlay.id = 'overlay'
        overlay.className = 'overlay'
        overlay.innerHTML = `<div class="modal-box">${html}</div>`
        if (closable)
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) fecharModal()
          })
        document.body.appendChild(overlay)
      }

      function fecharModal() {
        document.getElementById('overlay')?.remove()
      }

      // ── TOAST ─────────────────────────────────────────────────────────────────
      function toast(msg, type = 'info') {
        const icons = { info: 'fa-info-circle', warning: 'fa-exclamation-triangle', success: 'fa-check-circle' }
        const el = document.createElement('div')
        el.className = 'toast-msg'
        el.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${escapeHtml(msg)}`
        document.getElementById('toast-container').appendChild(el)
        setTimeout(() => {
          el.classList.add('removing')
          setTimeout(() => el.remove(), 320)
        }, 3000)
      }

      // ── BUSCAR FILA ───────────────────────────────────────────────────────────
      async function buscarFila() {
        try {
          const res = await fetch('/api/fila_espera')
          const data = await res.json()
          const total = data.total ?? 0

          document.getElementById('totalFila').textContent = total
          document.getElementById('statFila').textContent = total

          if (total > ultimoTotalFila && ultimoTotalFila > 0) toast('Novo cliente na fila!', 'info')
          ultimoTotalFila = total

          if (data.tempo_medio_espera != null)
            document.getElementById('statTempMed').textContent = formatarTempo(data.tempo_medio_espera) || '—'

          renderizarFila(data.clientes || [])
        } catch (err) {
          console.error('Erro fila:', err)
        }
      }

      async function buscarStats() {
        try {
          const res = await fetch('/api/estatisticas')
          const data = await res.json()
          document.getElementById('statAtivos').textContent = data.total_em_atendimento ?? 0
        } catch (_) {}
      }

      function renderizarFila(clientes) {
        const lista = document.getElementById('listaFila')
        if (clientes.length === 0) {
          lista.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-user-friends"></i>
              <p>Nenhum cliente na fila</p>
            </div>`
          return
        }
        lista.innerHTML = clientes
          .map((c) => {
            const esteAtendendo = clienteAtual && clienteAtual.id === c.id
            return `
            <div
              class="cliente-card ${esteAtendendo ? 'is-atendendo' : ''}"
              onclick="${esteAtendendo ? '' : `atender('${c.id}', '${escapeAttr(c.nome)}')`}"
              title="${esteAtendendo ? 'Em atendimento' : 'Clique para atender'}"
            >
              <div class="cliente-nome">
                <i class="fas fa-user fa-sm"></i>
                ${escapeHtml(c.nome)}
                ${esteAtendendo ? '<span class="badge-em-atendimento">Em atendimento</span>' : ''}
              </div>
              <div class="cliente-meta">
                <i class="fas fa-clock fa-xs"></i>
                Aguardando ${formatarTempo(c.tempo_espera)}
                &nbsp;·&nbsp; Posição ${c.posicao}
              </div>
            </div>`
          })
          .join('')
      }

      // ── ATENDER CLIENTE ───────────────────────────────────────────────────────
      async function atender(clienteId, nome) {
        if (clienteAtual) {
          mostrarAlerta(`Você já está atendendo <strong>${escapeHtml(clienteAtual.nome)}</strong>.<br>Finalize primeiro.`)
          return
        }
        try {
          const res = await fetch('/api/atender_cliente', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cliente_id: clienteId, operador: operadorNome })
          })
          const data = await res.json()
          if (!data.success) {
            toast('Cliente não disponível', 'warning')
            buscarFila()
            return
          }
          clienteAtual = { id: clienteId, nome }
          salaId = data.sala_id
          ultimoTimestamp = 0
          msgsSentByMe.clear()

          abrirChatUI(nome)
          if (pollInterval) clearInterval(pollInterval)
          pollInterval = setInterval(buscarMensagens, 2000)
          buscarMensagens()
          buscarFila()
        } catch (err) {
          console.error(err)
          toast('Erro ao iniciar atendimento', 'warning')
        }
      }

      // ── UI DO CHAT ────────────────────────────────────────────────────────────
      function abrirChatUI(nome) {
        document.getElementById('chatIdle').style.display = 'none'
        const chatAtivo = document.getElementById('chatAtivo')
        chatAtivo.style.display = 'flex'

        document.getElementById('chatTitulo').textContent = `Atendendo: ${nome}`
        document.getElementById('chatNome').textContent = nome
        document.getElementById('chatAvatar').textContent = nome.charAt(0).toUpperCase()

        document.getElementById('msgInput').disabled = false
        document.getElementById('btnSend').disabled = false

        document.getElementById('messagesArea').innerHTML = ''
        adicionarMensagem('sistema', 'Atendimento iniciado', false, true)

        const input = document.getElementById('msgInput')
        input.focus()
        input.addEventListener('keydown', handleInputKey)
        autoResizeTextarea(input)
      }

      function fecharChatUI() {
        document.getElementById('chatIdle').style.display = ''
        document.getElementById('chatAtivo').style.display = 'none'
        document.getElementById('chatTitulo').textContent = 'Chat'

        const input = document.getElementById('msgInput')
        input.value = ''
        input.disabled = true
        input.removeEventListener('keydown', handleInputKey)
        document.getElementById('btnSend').disabled = true
      }

      function handleInputKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault()
          enviarMensagem()
        }
      }

      function autoResizeTextarea(el) {
        el.addEventListener('input', () => {
          el.style.height = 'auto'
          el.style.height = Math.min(el.scrollHeight, 100) + 'px'
        })
      }

      // ── MENSAGENS ─────────────────────────────────────────────────────────────
      async function buscarMensagens() {
        if (!salaId) return
        try {
          const res = await fetch(`/api/mensagens/${salaId}?ultimo_timestamp=${ultimoTimestamp}`)
          const data = await res.json()

          if (data.mensagens?.length) {
            for (const msg of data.mensagens) {
              // Atualiza o timestamp para a próxima requisição
              if (msg.time && msg.time > ultimoTimestamp) ultimoTimestamp = msg.time

              // ── DEDUPLICAÇÃO ──
              // Mensagens do próprio operador já foram exibidas no envio otimista.
              // Só exibe do polling se não foi enviada por este operador.
              if (msg.de === operadorNome) continue

              const isSistema = msg.de === 'sistema'
              adicionarMensagem(msg.de, msg.texto, false, isSistema, msg.timestamp)
            }
          }
        } catch (err) {
          console.error('Erro mensagens:', err)
        }
      }

      function adicionarMensagem(de, texto, isMinha, isSistema, ts) {
        const area = document.getElementById('messagesArea')
        const el = document.createElement('div')
        const hora = ts || new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })

        if (isSistema) {
          el.className = 'msg-bubble msg-system'
          el.textContent = texto
        } else if (isMinha) {
          el.className = 'msg-bubble msg-operator'
          el.innerHTML = `
            <div class="msg-sender">Você</div>
            ${escapeHtml(texto)}
            <div class="msg-meta">${hora}</div>`
        } else {
          el.className = 'msg-bubble msg-client'
          el.innerHTML = `
            <div class="msg-sender">${escapeHtml(de)}</div>
            ${escapeHtml(texto)}
            <div class="msg-meta">${hora}</div>`
        }

        area.appendChild(el)
        area.scrollTop = area.scrollHeight
      }

      async function enviarMensagem() {
        const input = document.getElementById('msgInput')
        const texto = input.value.trim()
        if (!salaId || !texto) return

        // Exibe otimisticamente ANTES do fetch
        adicionarMensagem(operadorNome, texto, true, false)
        input.value = ''
        input.style.height = 'auto'

        try {
          const res = await fetch('/api/enviar_mensagem', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sala_id: salaId,
              de: operadorNome,
              texto,
              cliente_id: clienteAtual?.id
            })
          })
          const data = await res.json()
          if (data.success && data.mensagem?.time) {
            // Atualiza o timestamp para que o polling não reprocesse esta msg
            if (data.mensagem.time > ultimoTimestamp) ultimoTimestamp = data.mensagem.time
          }
          if (!data.success) {
            toast('Erro ao enviar mensagem', 'warning')
          }
        } catch (err) {
          console.error(err)
          toast('Erro ao enviar mensagem', 'warning')
          input.value = texto
        }
      }

      // ── FECHAR ATENDIMENTO ────────────────────────────────────────────────────
      function fecharAtendimento() {
        if (!salaId) return
        abrirModal(`
          <div class="modal-icon" style="color:#e74c3c"><i class="fas fa-question-circle"></i></div>
          <h3>Finalizar atendimento?</h3>
          <p>Tem certeza que deseja encerrar o chat com <strong>${escapeHtml(clienteAtual?.nome)}</strong>?</p>
          <button class="modal-btn modal-btn-danger" onclick="confirmarFechar()">
            <i class="fas fa-times"></i> Sim, finalizar
          </button>
          <button class="modal-btn modal-btn-ghost" onclick="fecharModal()">Cancelar</button>
        `)
      }

      async function confirmarFechar() {
        fecharModal()
        try {
          await fetch('/api/fechar_sala', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sala_id: salaId })
          })
        } catch (_) {}

        if (pollInterval) {
          clearInterval(pollInterval)
          pollInterval = null
        }
        salaId = null
        clienteAtual = null
        ultimoTimestamp = 0
        msgsSentByMe.clear()

        fecharChatUI()
        buscarFila()
        toast('Atendimento encerrado', 'success')
      }

      // ── ALERTAS ───────────────────────────────────────────────────────────────
      function mostrarAlerta(html) {
        abrirModal(`
          <div class="modal-icon"><i class="fas fa-info-circle"></i></div>
          <p style="margin-bottom:20px">${html}</p>
          <button class="modal-btn" onclick="fecharModal()">OK</button>
        `)
      }

      // ── UTILS ─────────────────────────────────────────────────────────────────
      function escapeHtml(str) {
        if (str == null) return ''
        const d = document.createElement('div')
        d.textContent = str
        return d.innerHTML
      }
      function escapeAttr(str) {
        return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;')
      }
      function formatarTempo(s) {
        if (!s) return 'agora'
        if (s < 60) return `${s}s`
        if (s < 3600) return `${Math.floor(s / 60)}min`
        return `${Math.floor(s / 3600)}h`
      }
    </script>
  </body>
</html>
