<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logs de Acesso - 123 Milhas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    body {
      background: #0a0c10;
      color: #e9ecef;
      font-family: Arial;
    }

    .header {
      background: #1a1d24;
      padding: 15px;
      border-bottom: 1px solid #2a2d35;
    }

    .logo {
      height: 40px;
      filter: brightness(0) invert(1);
    }

    .card-dark {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }

    .table {
      color: #e9ecef;
    }

    .badge-android { background: #28a745; }
    .badge-ios { background: #007bff; }
    .badge-desktop { background: #6c757d; }

    .btn-refresh {
      background: #f05929;
      border: none;
    }

    .btn-refresh:hover {
      background: #d94a1a;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
  <img src="/static/assets/img/logo.avif" class="logo">
  <span class="badge bg-secondary">Painel de Logs</span>
</div>

<div class="container mt-4">

  <!-- CONTROLES -->
  <div class="card-dark d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <strong><i class="fas fa-chart-line"></i> Acessos Recentes</strong>
    </div>

    <div class="d-flex gap-2">
      <select id="filtroOS" class="form-select form-select-sm" style="width:150px;">
        <option value="">Todos</option>
        <option value="Android">Android</option>
        <option value="iOS">iOS</option>
        <option value="Desktop">Desktop</option>
      </select>

      <button class="btn btn-refresh btn-sm text-white" onclick="carregarLogs()">
        <i class="fas fa-sync"></i> Atualizar
      </button>
    </div>
  </div>

  <!-- TABELA -->
  <div class="card-dark mt-3">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>#</th>
            <th>Data</th>
            <th>IP</th>
            <th>Sistema</th>
            <th>Dispositivo</th>
            <th>Navegador</th>
            <th>Rota</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr>
            <td colspan="7" class="text-center text-secondary">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
let logs = []

function formatarDataBR(dataString) {
  if (!dataString) return "-"

  // garante compatibilidade
  const data = new Date(dataString.replace(" ", "T"))

  if (isNaN(data)) return dataString

  const dia = String(data.getDate()).padStart(2, "0")
  const mes = String(data.getMonth() + 1).padStart(2, "0")
  const ano = data.getFullYear()

  return `${dia}/${mes}/${ano}`
}

async function carregarLogs() {
  const filtro = document.getElementById('filtroOS').value

  try {
    const res = await fetch('/logs')
    logs = await res.json()

    renderizar(filtro)

  } catch (e) {
    alert('Erro ao carregar logs')
  }
}

function renderizar(filtro) {
  const tbody = document.getElementById('tbody')
  tbody.innerHTML = ''

  let filtrados = logs

  if (filtro) {
    filtrados = logs.filter(l => l.os === filtro)
  }

  if (filtrados.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center">Sem dados</td></tr>`
    return
  }

  let html = ""

  filtrados.forEach((log, i) => {

    let badge = ''
    if (log.os === 'Android') badge = 'badge-android'
    else if (log.os === 'iOS') badge = 'badge-ios'
    else badge = 'badge-desktop'

    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${formatarDataBR(log.timestamp)}</td>
        <td>${log.ip}</td>
        <td><span class="badge ${badge}">${log.os}</span></td>
        <td>${log.device}</td>
        <td>${log.browser}</td>
        <td>${log.rota}</td>
      </tr>
    `
  })

  tbody.innerHTML = html
}

document.getElementById('filtroOS').addEventListener('change', () => {
  renderizar(document.getElementById('filtroOS').value)
})

setInterval(carregarLogs, 5000)

carregarLogs()
</script>

</body>
</html>
