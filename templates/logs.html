<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logs de Acesso - 123 Milhas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    body {
      background: #0a0c10;
      color: #e9ecef;
      font-family: Arial;
    }

    .header {
      background: #1a1d24;
      padding: 15px;
      border-bottom: 1px solid #2a2d35;
    }

    .logo {
      height: 40px;
      filter: brightness(0) invert(1);
    }

    .card-dark {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }

    .table {
      color: #e9ecef;
    }

    .badge-android { background: #28a745; }
    .badge-ios { background: #007bff; }
    .badge-desktop { background: #6c757d; }

    .btn-refresh {
      background: #f05929;
      border: none;
    }

    .btn-refresh:hover {
      background: #d94a1a;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
  <img src="/static/assets/img/logo.avif" class="logo">
  <span class="badge bg-secondary">Painel de Logs</span>
</div>

<div class="container mt-4">

  <!-- CONTROLES -->
  <div class="card-dark d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <strong><i class="fas fa-chart-line"></i> Acessos Recentes</strong>
    </div>

    <div class="d-flex gap-2">
      <select id="filtroOS" class="form-select form-select-sm" style="width:150px;">
        <option value="">Todos</option>
        <option value="Android">Android</option>
        <option value="iOS">iOS</option>
        <option value="Desktop">Desktop</option>
      </select>

      <button class="btn btn-refresh btn-sm text-white" onclick="carregarLogs()">
        <i class="fas fa-sync"></i> Atualizar
      </button>
    </div>
  </div>

  <!-- TABELA -->
  <div class="card-dark mt-3">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>#</th>
            <th>Data/Hora</th>
            <th>IP</th>
            <th>Sistema</th>
            <th>Dispositivo</th>
            <th>Navegador</th>
            <th>Rota</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr>
            <td colspan="7" class="text-center text-secondary">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
let logs = []

function formatarDataHora(dataString) {
  if (!dataString) return "-"
  
  // O timestamp já vem no formato "YYYY-MM-DD HH:MM:SS"
  // Se tiver o formato "2026-05-06 00:34:35"
  if (dataString.includes(' ')) {
    const [data, hora] = dataString.split(' ')
    const partesData = data.split('-')
    if (partesData.length === 3) {
      return `${partesData[2]}/${partesData[1]}/${partesData[0]} ${hora}`
    }
  }
  
  return dataString
}

async function carregarLogs() {
  const filtro = document.getElementById('filtroOS').value

  try {
    // CORREÇÃO: usar /api/logs ao invés de /logs
    const res = await fetch('/api/logs?limit=200')
    
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`)
    }
    
    logs = await res.json()
    console.log('Logs carregados:', logs.length) // Debug
    
    renderizar(filtro)

  } catch (e) {
    console.error('Erro ao carregar logs:', e)
    const tbody = document.getElementById('tbody')
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Erro ao carregar logs: ${e.message}</td></tr>`
  }
}

function renderizar(filtro) {
  const tbody = document.getElementById('tbody')
  tbody.innerHTML = ''

  if (!logs || logs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-secondary">Nenhum log encontrado</td></tr>`
    return
  }

  let filtrados = logs

  if (filtro) {
    filtrados = logs.filter(l => l.os === filtro)
  }

  if (filtrados.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-secondary">Sem dados para o filtro selecionado</td></tr>`
    return
  }

  let html = ""

  filtrados.forEach((log, i) => {
    let badgeClass = ''
    let badgeText = log.os || 'Desconhecido'
    
    if (badgeText === 'Android') badgeClass = 'badge-android'
    else if (badgeText === 'iOS') badgeClass = 'badge-ios'
    else badgeClass = 'badge-desktop'

    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${formatarDataHora(log.timestamp)}</td>
        <td>${log.ip || '-'}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td>${log.device || '-'}</td>
        <td>${log.browser || '-'}</td>
        <td>${log.rota || '-'}</td>
      </tr>
    `
  })

  tbody.innerHTML = html
}

// Filtro dinâmico
document.getElementById('filtroOS').addEventListener('change', () => {
  renderizar(document.getElementById('filtroOS').value)
})

// Auto-refresh a cada 10 segundos (menos agressivo)
setInterval(carregarLogs, 10000)

// Carrega logs ao iniciar
carregarLogs()
</script>

</body>
</html>
